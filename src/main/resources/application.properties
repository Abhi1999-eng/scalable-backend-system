spring.application.name=scalable-backend-system

# ========================
# DATABASE (PostgreSQL)
# ========================
spring.datasource.url=jdbc:postgresql://localhost:5432/scalable_system
spring.datasource.username=abhishekchaubey
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ========================
# REDIS
# ========================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ========================
# KAFKA
# ========================
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=user-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.max-poll-records=500
spring.kafka.listener.concurrency=3
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.linger.ms=10
spring.kafka.producer.properties.compression.type=lz4

app.kafka.topics.user-created=user-events.created
app.kafka.topics.user-deleted=user-events.deleted
app.kafka.topics.job-steps=job-runs.steps
app.kafka.enabled=true

# ========================
# SERVER (optional but useful)
# ========================
server.port=8082

# ========================
# MULTIPART / FILE INGESTION
# ========================
spring.servlet.multipart.max-file-size=5GB
spring.servlet.multipart.max-request-size=5GB
app.ingestion.storage-root=uploads
app.datasets.storage-root=dataset-uploads
app.dataset-query.cache-ttl-seconds=300
app.datasets.archive-max-entries=250
app.datasets.archive-max-uncompressed-bytes=1073741824
app.monitoring.dataset-slow-threshold-ms=10000
app.monitoring.job-slow-threshold-ms=10000
