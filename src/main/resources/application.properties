spring.application.name=scalable-backend-system

# ========================
# DATABASE (PostgreSQL)
# ========================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/scalable_system}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:abhishekchaubey}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ========================
# REDIS
# ========================
spring.data.redis.url=${SPRING_DATA_REDIS_URL:redis://localhost:6379}

# ========================
# KAFKA
# ========================
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

spring.kafka.consumer.group-id=user-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.max-poll-records=500
spring.kafka.listener.concurrency=3
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.linger.ms=10
spring.kafka.producer.properties.compression.type=lz4

app.kafka.topics.user-created=${APP_KAFKA_TOPIC_USER_CREATED:user-events.created}
app.kafka.topics.user-deleted=${APP_KAFKA_TOPIC_USER_DELETED:user-events.deleted}
app.kafka.topics.job-steps=${APP_KAFKA_TOPIC_JOB_STEPS:job-runs.steps}
app.kafka.enabled=${APP_KAFKA_ENABLED:true}

# ========================
# SERVER (optional but useful)
# ========================
server.port=${PORT:8082}

# ========================
# MULTIPART / FILE INGESTION
# ========================
spring.servlet.multipart.max-file-size=5GB
spring.servlet.multipart.max-request-size=5GB
app.ingestion.storage-root=${APP_INGESTION_STORAGE_ROOT:uploads}
app.datasets.storage-root=${APP_DATASETS_STORAGE_ROOT:dataset-uploads}
app.dataset-query.cache-ttl-seconds=${APP_DATASET_QUERY_CACHE_TTL_SECONDS:300}
app.datasets.archive-max-entries=${APP_DATASETS_ARCHIVE_MAX_ENTRIES:250}
app.datasets.archive-max-uncompressed-bytes=${APP_DATASETS_ARCHIVE_MAX_UNCOMPRESSED_BYTES:1073741824}
app.monitoring.dataset-slow-threshold-ms=${APP_MONITORING_DATASET_SLOW_THRESHOLD_MS:10000}
app.monitoring.job-slow-threshold-ms=${APP_MONITORING_JOB_SLOW_THRESHOLD_MS:10000}
app.auth.jwt-secret=${APP_AUTH_JWT_SECRET:change-this-local-secret-before-production}
app.auth.jwt-expiration-seconds=${APP_AUTH_JWT_EXPIRATION_SECONDS:86400}
